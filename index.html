<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fancy Currency Converter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="converter-shell">
    <div class="glass-card">
      <div class="brand">
        <span class="brand-badge">FX</span>
        <div>
          <h1>Currency Converter</h1>
          <p>Convert between popular currencies instantly.</p>
        </div>
      </div>

      <form id="converterForm" class="converter-form">
        <div class="field-group">
          <label for="amountInput">Amount</label>
          <input id="amountInput" type="number" step="0.01" min="0" placeholder="Enter amount" required />
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="fromCurrency">From</label>
            <select id="fromCurrency"></select>
          </div>

          <div class="field-group">
            <label for="toCurrency">To</label>
            <select id="toCurrency"></select>
          </div>
        </div>

        <button type="submit" class="convert-button">Convert Now</button>
      </form>

      <div id="resultCard" class="result-card hidden">
        <p class="result-label">Converted amount</p>
        <p id="resultText" class="result-value"></p>
      </div>

      <div id="errorMessage" class="error-message"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
